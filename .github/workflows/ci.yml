name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    name: Gate (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      # Replays the exact local pre-commit gate (CLAUDE.md golden rule 8):
      # composer validate/audit + php-cs-fixer + phpstan + phpunit (unit).
      - name: Validation gate
        run: bash scripts/check.sh

  integration:
    name: Integration (live Umami)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Start Umami test instance
        run: docker compose -f docker-compose.test.yml up -d

      # Waits for a real login (not just heartbeat), then creates the test
      # website and writes .env.test. curl/jq are preinstalled on the runner.
      - name: Seed Umami
        run: bash scripts/seed-umami.sh

      - name: Integration tests
        run: vendor/bin/phpunit --testsuite integration

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
